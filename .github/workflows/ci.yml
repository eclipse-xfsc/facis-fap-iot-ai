name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-simulation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/simulation
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run ruff
        run: ruff check src tests
      
      - name: Run black
        run: black --check src tests
      
      - name: Run mypy
        run: mypy src

  test-simulation:
    runs-on: ubuntu-latest
    needs: lint-simulation
    defaults:
      run:
        working-directory: services/simulation
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run unit tests
        run: pytest tests/unit --cov=src --cov-report=xml
      
      - name: Run integration tests
        run: pytest tests/integration
      
      - name: Run BDD tests
        run: |
          pytest tests/bdd || status=$?
          if [ "${status:-0}" -ne 0 ] && [ "${status:-0}" -ne 5 ]; then
            exit "${status}"
          fi
      
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./services/simulation/coverage.xml

  lint-ai-insight:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-insight-service
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src tests

      - name: Run black
        run: black --check src tests

      - name: Run mypy
        run: mypy src

  test-ai-insight:
    runs-on: ubuntu-latest
    needs: lint-ai-insight
    defaults:
      run:
        working-directory: services/ai-insight-service
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./services/ai-insight-service/coverage.xml

  lint-sftp-ingestion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sftp-ingestion-service
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src tests

      - name: Run black
        run: black --check src tests

  test-sftp-ingestion:
    runs-on: ubuntu-latest
    needs: lint-sftp-ingestion
    defaults:
      run:
        working-directory: services/sftp-ingestion-service
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./services/sftp-ingestion-service/coverage.xml

  lint-dsp-connector:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dsp-connector
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src tests

      - name: Run black
        run: black --check src tests

  test-dsp-connector:
    runs-on: ubuntu-latest
    needs: lint-dsp-connector
    defaults:
      run:
        working-directory: services/dsp-connector
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./services/dsp-connector/coverage.xml

  test-orce-flows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: DSP Connector — flow specs
        working-directory: services/dsp-connector/orce/tests
        run: node --test flows/*.spec.js

      - name: SFTP Ingestion — install dev deps (csv-parse)
        working-directory: services/sftp-ingestion-service/orce/tests
        run: npm install --include=dev

      - name: SFTP Ingestion — flow specs
        working-directory: services/sftp-ingestion-service/orce/tests
        run: node --test flows/*.spec.js

  test-ai-insight-orce:
    runs-on: ubuntu-latest
    needs: lint-ai-insight
    defaults:
      run:
        working-directory: services/ai-insight-service/orce
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/ai-insight-service/orce/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ORCE flow tests
        run: npm run test:flows

  build:
    runs-on: ubuntu-latest
    needs: [test-simulation, test-ai-insight, test-sftp-ingestion, test-dsp-connector, test-orce-flows, test-ai-insight-orce]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build simulation image
        run: docker build -t facis-simulation:${{ github.sha }} -f services/simulation/Dockerfile services/simulation

      - name: Build AI insight service image
        run: docker build -t facis-ai-insight-service:${{ github.sha }} -f services/ai-insight-service/Dockerfile services/ai-insight-service

      - name: Build SFTP ingestion service image
        run: docker build -t facis-sftp-ingestion:${{ github.sha }} -f services/sftp-ingestion-service/Dockerfile services/sftp-ingestion-service

      - name: Build DSP connector image
        run: docker build -t facis-dsp-connector:${{ github.sha }} -f services/dsp-connector/Dockerfile services/dsp-connector
