name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-simulation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/simulation
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run ruff
        run: ruff check src tests
      
      - name: Run black
        run: black --check src tests
      
      - name: Run mypy
        run: mypy src

  test-simulation:
    runs-on: ubuntu-latest
    needs: lint-simulation
    defaults:
      run:
        working-directory: services/simulation
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run unit tests
        run: pytest tests/unit --cov=src --cov-report=xml
      
      - name: Run integration tests
        run: pytest tests/integration
      
      - name: Run BDD tests
        run: |
          pytest tests/bdd || status=$?
          if [ "${status:-0}" -ne 0 ] && [ "${status:-0}" -ne 5 ]; then
            exit "${status}"
          fi
      
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./services/simulation/coverage.xml

  lint-ai-insight:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-insight-service
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src tests

      - name: Run black
        run: black --check src tests

      - name: Run mypy
        run: mypy src

  test-ai-insight:
    runs-on: ubuntu-latest
    needs: lint-ai-insight
    defaults:
      run:
        working-directory: services/ai-insight-service
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./services/ai-insight-service/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: [test-simulation, test-ai-insight]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build Docker image
        run: docker build -t facis-simulation:${{ github.sha }} -f services/simulation/Dockerfile services/simulation
