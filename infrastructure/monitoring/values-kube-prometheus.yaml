# =============================================================================
# kube-prometheus-stack — Helm Values for FACIS Platform
# =============================================================================
#
# Deploy with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install kube-prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f infrastructure/monitoring/values-kube-prometheus.yaml
#
# =============================================================================

# ---------------------------------------------------------------------------
# Prometheus
# ---------------------------------------------------------------------------
prometheus:
  prometheusSpec:
    # Discover ServiceMonitors in all namespaces (not just monitoring)
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    # Retention (keep costs manageable on small clusters)
    retention: 7d
    retentionSize: 5GB
    # Resource limits
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    # Storage (persistent volume for metric retention)
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# ---------------------------------------------------------------------------
# Grafana
# ---------------------------------------------------------------------------
grafana:
  enabled: true
  # REQUIRED: Supply Grafana admin credentials via an existing Kubernetes Secret.
  # Create it before deploying:
  #   kubectl create secret generic grafana-admin-credentials \
  #     --from-literal=admin-user=admin \
  #     --from-literal=admin-password=<YOUR_SECURE_PASSWORD> \
  #     -n monitoring
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  # Persistence
  persistence:
    enabled: true
    size: 2Gi
  # Dashboard provisioning from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
      folderAnnotation: grafana_folder
    datasources:
      enabled: true
      searchNamespace: ALL
  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Alertmanager
# ---------------------------------------------------------------------------
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  # Configure receivers (override with your actual notification endpoints)
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default"
      routes:
        - match:
            severity: critical
          receiver: "default"
          repeat_interval: 1h
    receivers:
      - name: "default"
        # Add Slack, email, or PagerDuty receivers here
        # webhook_configs:
        #   - url: https://hooks.slack.com/services/...

# ---------------------------------------------------------------------------
# Node Exporter (host metrics)
# ---------------------------------------------------------------------------
nodeExporter:
  enabled: true

# ---------------------------------------------------------------------------
# kube-state-metrics
# ---------------------------------------------------------------------------
kubeStateMetrics:
  enabled: true
