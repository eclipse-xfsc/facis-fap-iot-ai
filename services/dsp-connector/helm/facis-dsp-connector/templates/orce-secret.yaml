{{- if eq (default "orce" .Values.compatibilityMode) "orce" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "facis-dsp-connector.fullname" . }}-dsp-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-dsp-connector.labels" . | nindent 4 }}
type: Opaque
stringData:
  DSP_HMAC_SECRET: {{ required "dsp.hmacSecret is required in orce mode (e.g. openssl rand -hex 32)" .Values.dsp.hmacSecret | quote }}
  DSP_DATA_API_BASE_URL: {{ .Values.dsp.dataApiBaseUrl | quote }}
  DSP_DEFAULT_TTL_SECONDS: {{ .Values.dsp.defaultTtlSeconds | quote }}
  DSP_KAFKA_BOOTSTRAP: {{ .Values.dsp.kafkaBootstrap | quote }}
{{- end }}
