apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "facis-dsp-connector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-dsp-connector.labels" . | nindent 4 }}
spec:
  replicas: {{ if eq (default "orce" .Values.compatibilityMode) "orce" }}0{{ else }}{{ .Values.replicaCount }}{{ end }}
  selector:
    matchLabels:
      {{- include "facis-dsp-connector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "facis-dsp-connector.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "facis-dsp-connector.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "facis-dsp-connector.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.http.port }}
              protocol: TCP
          env:
            - name: HTTP_HOST
              value: "0.0.0.0"
            - name: HTTP_PORT
              value: {{ .Values.http.port | quote }}
            - name: DSP_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "facis-dsp-connector.fullname" . }}-dsp-secrets
                  key: DSP_HMAC_SECRET
                  optional: true
            - name: DSP_DATA_API_BASE_URL
              value: {{ .Values.dsp.dataApiBaseUrl | quote }}
            - name: DSP_DEFAULT_TTL_SECONDS
              value: {{ .Values.dsp.defaultTtlSeconds | quote }}
            - name: DSP_KAFKA_BOOTSTRAP
              value: {{ .Values.dsp.kafkaBootstrap | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
