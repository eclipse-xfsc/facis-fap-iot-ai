# =============================================================================
# FACIS DSP Connector — Helm Values
# =============================================================================
# All values are documented inline. Override any value with --set or -f.

# ---------------------------------------------------------------------------
# Runtime Mode
# ---------------------------------------------------------------------------
# Selects which runtime owns the DSP control plane.
#
#   orce   (default) — ORCE-native flows on the existing ORCE pod own the
#                       runtime. The Python deployment in this chart is
#                       scaled to 0 and acts as a rollback fallback. Helm
#                       post-install hook deploys the flow ConfigMap to the
#                       ORCE Admin API (see orceFlowDeploy below).
#                       Endpoints exposed by ORCE pod, NOT this chart's Service.
#   legacy           — Python FastAPI service owns the runtime. ORCE flow
#                       ConfigMap + Job are NOT rendered.
compatibilityMode: orce

# ---------------------------------------------------------------------------
# ORCE Flow Deployment (active when compatibilityMode = "orce")
# ---------------------------------------------------------------------------
orceFlowDeploy:
  # -- Whether to render the ConfigMap + post-install Job that deploy flows
  enabled: true
  # -- ORCE Admin API base URL (in-cluster)
  orceAdminUrl: http://facis-orce.orce.svc.cluster.local:1880
  # -- Secret holding the ORCE admin bearer token under key "token"
  adminTokenSecret: facis-orce-admin
  # -- Sub-path under the chart's `files/` directory containing flow JSON.
  #    Populate via `services/dsp-connector/helm/facis-dsp-connector/sync-flows.sh`.
  flowsDir: orce-flows
  # -- Container image used by the deployment Job (must include curl + jq)
  jobImage:
    repository: alpine/curl
    tag: "8.10.1"
    pullPolicy: IfNotPresent
  # -- Optional initial wait for the ORCE pod readiness probe (seconds)
  preDeploySleepSeconds: 5

# ---------------------------------------------------------------------------
# DSP Configuration
# ---------------------------------------------------------------------------
# The ORCE pod reads these values from a Secret rendered by this chart
# (see templates/orce-secret.yaml). The ORCE chart must include
# `envFrom: [secretRef: <fullname>-dsp-secrets]` in its Deployment.
dsp:
  # -- HMAC secret for signed-URL generation (REQUIRED in orce mode).
  #    Generate with: openssl rand -hex 32
  hmacSecret: ""
  # -- Base URL for the data API (HTTP-pull endpoint of ai-insight-service)
  dataApiBaseUrl: https://ai-insight.facis.cloud
  # -- Default TTL for signed URLs and Kafka access tokens (seconds)
  defaultTtlSeconds: 3600
  # -- Kafka bootstrap servers used in Kafka-streaming access objects.
  #    Connection params only — DSP does not produce data to this Kafka.
  kafkaBootstrap: kafka.provider.example:9092

# ---------------------------------------------------------------------------
# State Persistence (orce mode)
# ---------------------------------------------------------------------------
# The ORCE pod's flows write transfer + negotiation state to a PVC at
# /data/dsp-state/. The PVC is created by this chart but mounted by the
# ORCE chart (cross-chart dependency — document in README).
dspStatePvc:
  enabled: true
  name: facis-dsp-state
  size: 256Mi
  storageClassName: ""
  accessModes:
    - ReadWriteOnce

# ---------------------------------------------------------------------------
# Container Image (legacy mode only — Python runtime)
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/eclipse-xfsc/facis-fap-iot-ai/dsp-connector
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Number of Python pod replicas. Ignored when compatibilityMode==orce
#    (Deployment scales to 0 in orce mode).
replicaCount: 1

# ---------------------------------------------------------------------------
# HTTP / REST API (legacy mode only)
# ---------------------------------------------------------------------------
http:
  port: 8090

# ---------------------------------------------------------------------------
# Service (legacy mode only — ORCE pod has its own Service)
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  httpPort: 8090

# ---------------------------------------------------------------------------
# Pod Security
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# ---------------------------------------------------------------------------
# Probes (legacy mode only)
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# ---------------------------------------------------------------------------
# Metrics (legacy mode only — ORCE serves /dsp/metrics from its own pod)
# ---------------------------------------------------------------------------
metrics:
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

# ---------------------------------------------------------------------------
# Scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
