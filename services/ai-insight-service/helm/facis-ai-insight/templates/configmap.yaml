{{/*
Main ConfigMap — Trino connectivity and application configuration.
Non-sensitive values sourced from this ConfigMap are injected as env vars
in the Deployment via configMapKeyRef.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "facis-ai-insight.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-ai-insight.labels" . | nindent 4 }}
data:
  # -------------------------------------------------------------------------
  # Trino connectivity (referenced by env vars in the Deployment)
  # -------------------------------------------------------------------------
  trino_host: {{ .Values.trino.host | quote }}
  trino_port: {{ .Values.trino.port | quote }}
  trino_http_scheme: {{ .Values.trino.httpScheme | quote }}
  trino_user: {{ .Values.trino.user | quote }}
  trino_catalog: {{ .Values.trino.catalog | quote }}
  trino_target_schema: {{ .Values.trino.targetSchema | quote }}
  trino_table_net_grid_hourly: {{ .Values.trino.tableNetGridHourly | quote }}
  trino_table_event_impact_daily: {{ .Values.trino.tableEventImpactDaily | quote }}
  trino_table_streetlight_zone_hourly: {{ .Values.trino.tableStreetlightZoneHourly | quote }}
  trino_table_weather_hourly: {{ .Values.trino.tableWeatherHourly | quote }}
  trino_table_energy_cost_daily: {{ .Values.trino.tableEnergyCostDaily | quote }}
  trino_table_pv_self_consumption_daily: {{ .Values.trino.tablePvSelfConsumptionDaily | quote }}

  # -------------------------------------------------------------------------
  # Application configuration (cluster overlay, YAML format)
  # Generated by Helm chart {{ include "facis-ai-insight.chart" . }}
  # -------------------------------------------------------------------------
  cluster.yaml: |
    service:
      environment: production

    http:
      host: "0.0.0.0"
      port: {{ .Values.http.port }}

    logging:
      level: {{ .Values.logging.level | quote }}

    llm:
      model: {{ .Values.llm.model | quote }}
      timeout_seconds: {{ .Values.llm.timeoutSeconds }}
      max_retries: {{ .Values.llm.maxRetries }}
      retry_base_delay_seconds: {{ .Values.llm.retryBaseDelaySecs }}
      retry_max_delay_seconds: {{ .Values.llm.retryMaxDelaySecs }}
      require_https: {{ .Values.llm.requireHttps }}

    trino:
      host: {{ .Values.trino.host | quote }}
      port: {{ .Values.trino.port }}
      user: {{ .Values.trino.user | quote }}
      catalog: {{ .Values.trino.catalog | quote }}
      target_schema: {{ .Values.trino.targetSchema | quote }}
      http_scheme: {{ .Values.trino.httpScheme | quote }}
      verify: {{ .Values.trino.verify | quote }}
      table_net_grid_hourly: {{ .Values.trino.tableNetGridHourly | quote }}
      table_event_impact_daily: {{ .Values.trino.tableEventImpactDaily | quote }}
      table_streetlight_zone_hourly: {{ .Values.trino.tableStreetlightZoneHourly | quote }}
      table_weather_hourly: {{ .Values.trino.tableWeatherHourly | quote }}
      table_energy_cost_daily: {{ .Values.trino.tableEnergyCostDaily | quote }}
      table_pv_self_consumption_daily: {{ .Values.trino.tablePvSelfConsumptionDaily | quote }}

    policy:
      enabled: {{ .Values.policy.enabled }}
      agreement_header: {{ .Values.policy.agreementHeader | quote }}
      asset_header: {{ .Values.policy.assetHeader | quote }}
      role_header: {{ .Values.policy.roleHeader | quote }}

    rate_limit:
      enabled: {{ .Values.rateLimit.enabled }}
      requests_per_minute: {{ .Values.rateLimit.requestsPerMinute }}

    cache:
      enabled: {{ .Values.cache.enabled }}
      ttl_seconds: {{ .Values.cache.ttlSeconds }}
      key_prefix: {{ .Values.cache.keyPrefix | quote }}
      connect_timeout_seconds: {{ .Values.cache.connectTimeoutSeconds }}

    audit:
      enabled: {{ .Values.audit.enabled }}
      log_prompts: {{ .Values.audit.logPrompts }}
      log_responses: {{ .Values.audit.logResponses }}

    prompt_templates:
      enabled: {{ .Values.promptTemplates.enabled }}
      path: {{ .Values.promptTemplates.path | quote }}

---
{{/*
Prompt Templates ConfigMap
Each key becomes a file mounted under .Values.promptTemplates.path.
*/}}
{{- if .Values.promptTemplates.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "facis-ai-insight.promptTemplatesConfigMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-ai-insight.labels" . | nindent 4 }}
data:
  {{- range $filename, $content := .Values.promptTemplates.templates }}
  {{ $filename }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
