apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "facis-ai-insight.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-ai-insight.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "facis-ai-insight.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "facis-ai-insight.labels" . | nindent 8 }}
      annotations:
        # Force rollout when ConfigMap or Secret content changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "facis-ai-insight.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "facis-ai-insight.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.http.port }}
              protocol: TCP
          env:
            # Environment marker consumed by the application config loader
            - name: FACIS_ENV
              value: cluster
            # HTTP bind address
            - name: AI_INSIGHT_HTTP__HOST
              value: "0.0.0.0"
            - name: AI_INSIGHT_HTTP__PORT
              value: {{ .Values.http.port | quote }}
            # LLM credentials (Secret)
            - name: AI_INSIGHT_LLM__CHAT_COMPLETIONS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "facis-ai-insight.llmSecretName" . }}
                  key: llm_chat_completions_url
            - name: AI_INSIGHT_LLM__API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "facis-ai-insight.llmSecretName" . }}
                  key: llm_api_key
            # LLM tuning (ConfigMap / values)
            - name: AI_INSIGHT_LLM__MODEL
              value: {{ .Values.llm.model | quote }}
            - name: AI_INSIGHT_LLM__TIMEOUT_SECONDS
              value: {{ .Values.llm.timeoutSeconds | quote }}
            - name: AI_INSIGHT_LLM__MAX_RETRIES
              value: {{ .Values.llm.maxRetries | quote }}
            - name: AI_INSIGHT_LLM__REQUIRE_HTTPS
              value: {{ .Values.llm.requireHttps | quote }}
            # Trino connectivity (ConfigMap)
            - name: AI_INSIGHT_TRINO__HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "facis-ai-insight.configMapName" . }}
                  key: trino_host
            - name: AI_INSIGHT_TRINO__PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "facis-ai-insight.configMapName" . }}
                  key: trino_port
            - name: AI_INSIGHT_TRINO__HTTP_SCHEME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "facis-ai-insight.configMapName" . }}
                  key: trino_http_scheme
            - name: AI_INSIGHT_TRINO__USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "facis-ai-insight.configMapName" . }}
                  key: trino_user
            # Trino TLS verification (path to CA cert mounted from Secret)
            - name: AI_INSIGHT_TRINO__VERIFY
              value: {{ .Values.trino.verify | quote }}
            # Policy
            - name: AI_INSIGHT_POLICY__ENABLED
              value: {{ .Values.policy.enabled | quote }}
            - name: AI_INSIGHT_POLICY__AGREEMENT_HEADER
              value: {{ .Values.policy.agreementHeader | quote }}
            - name: AI_INSIGHT_POLICY__ASSET_HEADER
              value: {{ .Values.policy.assetHeader | quote }}
            - name: AI_INSIGHT_POLICY__ROLE_HEADER
              value: {{ .Values.policy.roleHeader | quote }}
            # Rate limiting
            - name: AI_INSIGHT_RATE_LIMIT__ENABLED
              value: {{ .Values.rateLimit.enabled | quote }}
            - name: AI_INSIGHT_RATE_LIMIT__REQUESTS_PER_MINUTE
              value: {{ .Values.rateLimit.requestsPerMinute | quote }}
            # Cache
            - name: AI_INSIGHT_CACHE__ENABLED
              value: {{ .Values.cache.enabled | quote }}
            {{- if and .Values.cache.enabled .Values.cache.redisUrl }}
            - name: AI_INSIGHT_CACHE__REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "facis-ai-insight.llmSecretName" . }}
                  key: redis_url
            {{- end }}
            - name: AI_INSIGHT_CACHE__TTL_SECONDS
              value: {{ .Values.cache.ttlSeconds | quote }}
            - name: AI_INSIGHT_CACHE__KEY_PREFIX
              value: {{ .Values.cache.keyPrefix | quote }}
            # Audit
            - name: AI_INSIGHT_AUDIT__ENABLED
              value: {{ .Values.audit.enabled | quote }}
            - name: AI_INSIGHT_AUDIT__LOG_PROMPTS
              value: {{ .Values.audit.logPrompts | quote }}
            - name: AI_INSIGHT_AUDIT__LOG_RESPONSES
              value: {{ .Values.audit.logResponses | quote }}
            # Prompt templates
            - name: AI_INSIGHT_PROMPT_TEMPLATES__ENABLED
              value: {{ .Values.promptTemplates.enabled | quote }}
            - name: AI_INSIGHT_PROMPT_TEMPLATES__PATH
              value: {{ .Values.promptTemplates.path | quote }}
            # Logging
            - name: AI_INSIGHT_LOGGING__LEVEL
              value: {{ .Values.logging.level | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Writable scratch space (required when readOnlyRootFilesystem=true)
            - name: tmp
              mountPath: /tmp
            # Trino CA certificate (Secret → /app/certs/ca.crt)
            - name: trino-ca
              mountPath: /app/certs
              readOnly: true
            # Prompt template files (ConfigMap → /app/config/prompts/)
            {{- if .Values.promptTemplates.enabled }}
            - name: prompt-templates
              mountPath: {{ .Values.promptTemplates.path }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: trino-ca
          secret:
            secretName: {{ include "facis-ai-insight.trinoCASecretName" . }}
        {{- if .Values.promptTemplates.enabled }}
        - name: prompt-templates
          configMap:
            name: {{ include "facis-ai-insight.promptTemplatesConfigMapName" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
