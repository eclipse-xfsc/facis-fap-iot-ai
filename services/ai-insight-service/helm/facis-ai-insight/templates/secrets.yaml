{{/*
LLM Credentials Secret
Stores the chat-completions URL and API key used by the AI Insight Service
to authenticate against the LLM provider endpoint.

If llmSecret.create=false, provision this Secret externally before installing
the chart. The Secret must contain the keys:
  llm_chat_completions_url
  llm_api_key
and (when cache.enabled=true and cache.redisUrl is non-empty):
  redis_url
*/}}
{{- if .Values.llmSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "facis-ai-insight.llmSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-ai-insight.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Required — set via --set llm.chatCompletionsUrl=https://... or a values override file.
  llm_chat_completions_url: {{ .Values.llm.chatCompletionsUrl | quote }}
  # Required — set via --set llm.apiKey=sk-... or a values override file.
  llm_api_key: {{ .Values.llm.apiKey | quote }}
  {{- if and .Values.cache.enabled .Values.cache.redisUrl }}
  # Optional — only written when cache.enabled=true and cache.redisUrl is non-empty.
  redis_url: {{ .Values.cache.redisUrl | quote }}
  {{- end }}
{{- end }}

{{/*
Trino CA Certificate Secret
Holds the PEM-encoded CA certificate used to verify the Trino coordinator's
TLS certificate. The certificate is mounted at .Values.trino.verify inside
the container.

If trinoCA.create=false, provision this Secret externally. The Secret must
contain the key:
  ca.crt
*/}}
{{- if .Values.trinoCA.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "facis-ai-insight.trinoCASecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-ai-insight.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # PEM-encoded CA certificate. Set via --set trinoCA.crt="$(cat ca.crt)" or
  # a values override file. Leave empty only if trinoCA.create=false.
  ca.crt: {{ .Values.trinoCA.crt | quote }}
{{- end }}
