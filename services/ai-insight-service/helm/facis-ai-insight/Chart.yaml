apiVersion: v2
name: facis-ai-insight
description: >-
  AI Insight Service for the FACIS FAP IoT & AI demonstrator.
  Provides natural-language analysis of Smart-City/Energy telemetry stored in
  Trino by orchestrating LLM chat-completions with structured prompt templates,
  policy enforcement, rate limiting, and optional Redis caching.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.25.0"
home: https://github.com/eclipse-xfsc/facis-fap-iot-ai
sources:
  - https://github.com/eclipse-xfsc/facis-fap-iot-ai
maintainers:
  - name: ATLAS IoT Lab GmbH
    url: https://atlas-iot-lab.com
keywords:
  - facis
  - ai
  - insight
  - llm
  - trino
  - iot
  - smart-energy
  - eclipse
annotations:
  org.opencontainers.image.licenses: Apache-2.0
  eclipse.org/project: facis
