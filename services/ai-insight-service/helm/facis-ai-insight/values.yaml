# =============================================================================
# FACIS AI Insight Service — Helm Values
# =============================================================================
# All values are documented inline. Override any value with --set or -f.

# ---------------------------------------------------------------------------
# Container Image
# ---------------------------------------------------------------------------
image:
  # -- Container registry and repository
  repository: ghcr.io/eclipse-xfsc/facis-fap-iot-ai/ai-insight-service
  # -- Image tag (defaults to Chart appVersion)
  tag: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []
# - name: regcred

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Replica count
# ---------------------------------------------------------------------------
# -- Number of replicas (1 recommended — LLM gateway is effectively stateless
#    but Redis caching is per-instance unless a shared Redis URL is configured)
replicaCount: 1

# ---------------------------------------------------------------------------
# LLM Configuration
# ---------------------------------------------------------------------------
llm:
  # -- OpenAI-compatible chat completions endpoint URL (required, stored in Secret)
  chatCompletionsUrl: ""
  # -- LLM API key (required, stored in Secret)
  apiKey: ""
  # -- Model identifier sent to the completions endpoint
  model: gpt-4.1-mini
  # -- Request timeout in seconds
  timeoutSeconds: 30
  # -- Maximum number of retries on transient errors
  maxRetries: 3
  # -- Base delay in seconds for exponential back-off
  retryBaseDelaySecs: 0.5
  # -- Maximum delay cap in seconds for exponential back-off
  retryMaxDelaySecs: 8.0
  # -- Enforce HTTPS on the completions URL (set false only for local dev)
  requireHttps: true

# ---------------------------------------------------------------------------
# Trino Configuration
# ---------------------------------------------------------------------------
trino:
  # -- Trino coordinator hostname (stored in ConfigMap)
  host: trino
  # -- Trino coordinator HTTP(S) port (stored in ConfigMap)
  port: "8443"
  # -- HTTP scheme: http or https
  httpScheme: https
  # -- Path to CA certificate inside the container that Trino TLS is verified against
  verify: /app/certs/trino-ca.crt
  # -- Trino username (used for query attribution)
  user: trino
  # -- Trino catalog containing FACIS gold tables
  catalog: hive
  # -- Trino schema containing FACIS gold tables
  targetSchema: gold
  # -- Net-grid hourly table name
  tableNetGridHourly: net_grid_hourly
  # -- Event impact daily table name
  tableEventImpactDaily: event_impact_daily
  # -- Streetlight zone hourly table name
  tableStreetlightZoneHourly: streetlight_zone_hourly
  # -- Weather hourly table name
  tableWeatherHourly: weather_hourly
  # -- Energy cost daily table name
  tableEnergyCostDaily: energy_cost_daily
  # -- PV self-consumption daily table name
  tablePvSelfConsumptionDaily: pv_self_consumption_daily

# ---------------------------------------------------------------------------
# Trino CA Certificate (Secret)
# ---------------------------------------------------------------------------
trinoCA:
  # -- Create the trino-ca Secret from values (set to false if you manage the
  #    Secret externally, e.g. via Sealed Secrets or Vault)
  create: true
  # -- Name override for the trino-ca Secret (generated from fullname if empty)
  nameOverride: ""
  # -- PEM-encoded CA certificate content (base64-encoded at Secret creation time
  #    by Helm). Leave empty and populate the Secret manually if create=false.
  crt: ""

# ---------------------------------------------------------------------------
# LLM Credentials Secret
# ---------------------------------------------------------------------------
llmSecret:
  # -- Create the LLM credentials Secret from values (set to false if you manage
  #    the Secret externally)
  create: true
  # -- Name override for the LLM credentials Secret
  nameOverride: ""

# ---------------------------------------------------------------------------
# Policy Enforcement
# ---------------------------------------------------------------------------
policy:
  # -- Enable request-level policy enforcement (header-based ABAC)
  enabled: true
  # -- HTTP header carrying the agreement identifier
  agreementHeader: x-agreement-id
  # -- HTTP header carrying the asset identifier
  assetHeader: x-asset-id
  # -- HTTP header carrying the comma-separated user roles
  roleHeader: x-user-roles

# ---------------------------------------------------------------------------
# HMAC Signed URLs (DSP HTTP Pull Profile)
# ---------------------------------------------------------------------------
hmac:
  # -- Enable HMAC-signed URL validation for DSP pull requests
  enabled: true
  # -- HMAC signing secret (stored in Secret; auto-generated if empty)
  secret: ""
  # -- Base URL for generated signed URLs
  baseUrl: "https://ai-insight.facis.cloud"
  # -- Default TTL for signed URLs in seconds
  defaultTtlSeconds: 3600
  # -- Maximum TTL allowed for signed URLs in seconds
  maxTtlSeconds: 86400

# ---------------------------------------------------------------------------
# Rate Limiting
# ---------------------------------------------------------------------------
rateLimit:
  # -- Enable per-client rate limiting
  enabled: true
  # -- Maximum requests per minute allowed per client
  requestsPerMinute: 10

# ---------------------------------------------------------------------------
# Redis Cache
# ---------------------------------------------------------------------------
cache:
  # -- Enable Redis-backed response caching
  enabled: false
  # -- Redis connection URL (stored in Secret when provided)
  # -- Example: redis://:password@redis-master:6379/0
  redisUrl: ""
  # -- Cache TTL in seconds
  ttlSeconds: 300
  # -- Cache key prefix
  keyPrefix: "ai-insight:cache:v1"
  # -- Redis connection timeout in seconds
  connectTimeoutSeconds: 1.0

# ---------------------------------------------------------------------------
# Audit Logging
# ---------------------------------------------------------------------------
audit:
  # -- Enable audit logging of requests and responses
  enabled: true
  # -- Include prompt content in audit log
  logPrompts: true
  # -- Include LLM response content in audit log
  logResponses: true

# ---------------------------------------------------------------------------
# Prompt Templates
# ---------------------------------------------------------------------------
promptTemplates:
  # -- Enable prompt-template loading from disk
  enabled: true
  # -- Mount path inside the container for prompt template files
  path: /app/config/prompts
  # -- Create the prompt-templates ConfigMap from values below
  create: true
  # -- Name override for the prompt-templates ConfigMap
  nameOverride: ""
  # -- Template file contents keyed by filename.
  #    Each entry is written as a file under .path inside the container.
  templates:
    simulation_service_context.txt: |
      FACIS domain context:
      - This analysis supports the FACIS demonstrator where simulation-service generates IoT/Smart-City events and related telemetry that are later analyzed in ai-insight-service.
      - Consider data provenance as simulation-backed unless a field indicates otherwise.
      - Keep claims aligned with provided context only; do not invent missing measurements or causes.
    data_schema_descriptions.txt: |
      Data schema guide:
      - `window`: `{start_ts, end_ts, timezone, rows_analyzed}` for analysis scope.
      - `summary`: compact metrics for quick interpretation.
      - `narrative_hints`: deterministic cues from analytics logic; treat as guidance, not hard facts.
      - Outlier context includes `baseline_stats`, `outlier_events`, and `cost_anomalies`.
      - Smart-city context includes `event_response_patterns`, `lag_distribution`, and `high_confidence_links`.
      - Trend/forecast context includes `trend_signals`, `moving_averages`, `seasonality_patterns`, `forecast_24h`, and `data_availability`.
    output_format_instructions.txt: |
      Return ONLY valid JSON, with no markdown and no prose outside JSON.
      Required top-level object keys (exactly these keys):
      - `summary`: string (2-4 sentences, concise executive overview)
      - `key_findings`: array of strings (3-6 bullets worth of findings, each one sentence)
      - `recommendations`: array of strings (2-5 actionable recommendations, each one sentence)
      Constraints:
      - Do not include additional top-level keys.
      - Preserve factual consistency with provided context.
      - If evidence is insufficient, state uncertainty explicitly in findings/recommendations.
    insight_type_net_grid_outliers.txt: |
      Insight type: Net-grid outlier analysis.
      Focus on abnormal consumption/generation/cost behavior, frequency by metric, and likely impact.
    insight_type_smart_city_correlation.txt: |
      Insight type: Smart-city event correlation.
      Focus on event-to-infrastructure response, confidence levels, lag windows, and zone patterns.
    insight_type_energy_trend_forecast.txt: |
      Insight type: Energy trend and 24h forecast.
      Focus on trend direction, seasonality effects, forecast plausibility, and operational implications.

# ---------------------------------------------------------------------------
# HTTP / REST API
# ---------------------------------------------------------------------------
http:
  # -- HTTP listen port inside the container
  port: 8080

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  # -- Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  # -- Kubernetes Service type
  type: ClusterIP
  # -- HTTP service port
  httpPort: 8080
  # -- Additional annotations for the Service
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress (optional)
# ---------------------------------------------------------------------------
ingress:
  # -- Enable Ingress resource
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # -- Ingress host rules
  hosts: []
  #  - host: ai-insight.facis.cloud
  #    paths:
  #      - path: /
  #        pathType: Prefix
  # -- TLS configuration
  tls: []

# ---------------------------------------------------------------------------
# Pod Security Context
# ---------------------------------------------------------------------------
podSecurityContext:
  # -- Run all containers as non-root
  runAsNonRoot: true
  # -- UID to run as (matches Dockerfile USER 1000)
  runAsUser: 1000
  # -- GID to run as
  runAsGroup: 1000
  # -- Filesystem group
  fsGroup: 1000

# ---------------------------------------------------------------------------
# Container Security Context
# ---------------------------------------------------------------------------
securityContext:
  # -- Disallow privilege escalation
  allowPrivilegeEscalation: false
  # -- Read-only root filesystem
  readOnlyRootFilesystem: true
  # -- Drop all Linux capabilities
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Resource Requests and Limits
# ---------------------------------------------------------------------------
resources:
  requests:
    # -- CPU request
    cpu: 100m
    # -- Memory request
    memory: 256Mi
  limits:
    # -- CPU limit
    cpu: 500m
    # -- Memory limit
    memory: 512Mi

# ---------------------------------------------------------------------------
# Liveness and Readiness Probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount name (generated from fullname if empty)
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Automount API credentials into pods
  automountServiceAccountToken: false

# ---------------------------------------------------------------------------
# Node scheduling
# ---------------------------------------------------------------------------
# -- Node selector labels
nodeSelector: {}
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}

# ---------------------------------------------------------------------------
# Prometheus Metrics
# ---------------------------------------------------------------------------
metrics:
  # -- Path where Prometheus metrics are served
  path: /metrics
  # -- ServiceMonitor configuration (requires Prometheus Operator)
  serviceMonitor:
    # -- Enable ServiceMonitor resource
    enabled: false
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout
    scrapeTimeout: 10s
    # -- Additional labels for ServiceMonitor (e.g. for Prometheus selector)
    additionalLabels: {}

# ---------------------------------------------------------------------------
# Autoscaling (HPA)
# ---------------------------------------------------------------------------
autoscaling:
  # -- Enable Horizontal Pod Autoscaler (overrides replicaCount when true)
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage (0 to disable)
  targetCPUUtilizationPercentage: 70
  # -- Target memory utilization percentage (0 to disable)
  targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Additional environment variables
# ---------------------------------------------------------------------------
# -- Extra environment variables injected verbatim into the container.
#    Useful for provider-specific settings not exposed as chart values.
extraEnv: []
# - name: AI_INSIGHT_LLM__MAX_TOKENS
#   value: "2048"

# ---------------------------------------------------------------------------
# Additional volumes and volume mounts
# ---------------------------------------------------------------------------
# -- Extra volumes appended to the Pod spec
extraVolumes: []
# -- Extra volume mounts appended to the container spec
extraVolumeMounts: []
