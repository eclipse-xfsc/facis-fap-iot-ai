services:
  ai-insight:
    build: .
    container_name: facis-ai-insight
    ports:
      - "${AI_INSIGHT_HTTP__PORT:-8080}:${AI_INSIGHT_HTTP__PORT:-8080}"
    environment:
      - FACIS_ENV=${FACIS_ENV:-development}
      - AI_INSIGHT_HTTP__HOST=${AI_INSIGHT_HTTP__HOST:-0.0.0.0}
      - AI_INSIGHT_HTTP__PORT=${AI_INSIGHT_HTTP__PORT:-8080}
      - AI_INSIGHT_LLM__API_KEY=${AI_INSIGHT_LLM__API_KEY:-}
      - AI_INSIGHT_LLM__MODEL=${AI_INSIGHT_LLM__MODEL:-gpt-4.1-mini}
      - AI_INSIGHT_LLM__CHAT_COMPLETIONS_URL=${AI_INSIGHT_LLM__CHAT_COMPLETIONS_URL:-}
      - AI_INSIGHT_LLM__TIMEOUT_SECONDS=${AI_INSIGHT_LLM__TIMEOUT_SECONDS:-30}
      - AI_INSIGHT_LLM__MAX_RETRIES=${AI_INSIGHT_LLM__MAX_RETRIES:-3}
      - AI_INSIGHT_LLM__RETRY_BASE_DELAY_SECONDS=${AI_INSIGHT_LLM__RETRY_BASE_DELAY_SECONDS:-0.5}
      - AI_INSIGHT_LLM__RETRY_MAX_DELAY_SECONDS=${AI_INSIGHT_LLM__RETRY_MAX_DELAY_SECONDS:-8.0}
      - AI_INSIGHT_LLM__REQUIRE_HTTPS=${AI_INSIGHT_LLM__REQUIRE_HTTPS:-true}
      - AI_INSIGHT_TRINO__HOST=${AI_INSIGHT_TRINO__HOST:-localhost}
      - AI_INSIGHT_TRINO__PORT=${AI_INSIGHT_TRINO__PORT:-8080}
      - AI_INSIGHT_TRINO__USER=${AI_INSIGHT_TRINO__USER:-trino}
      - AI_INSIGHT_TRINO__OIDC_TOKEN_URL=${AI_INSIGHT_TRINO__OIDC_TOKEN_URL:-}
      - AI_INSIGHT_TRINO__OIDC_CLIENT_ID=${AI_INSIGHT_TRINO__OIDC_CLIENT_ID:-}
      - AI_INSIGHT_TRINO__OIDC_CLIENT_SECRET=${AI_INSIGHT_TRINO__OIDC_CLIENT_SECRET:-}
      - AI_INSIGHT_TRINO__OIDC_USERNAME=${AI_INSIGHT_TRINO__OIDC_USERNAME:-}
      - AI_INSIGHT_TRINO__OIDC_PASSWORD=${AI_INSIGHT_TRINO__OIDC_PASSWORD:-}
      - AI_INSIGHT_TRINO__OIDC_SCOPE=${AI_INSIGHT_TRINO__OIDC_SCOPE:-openid}
      - AI_INSIGHT_TRINO__OIDC_VERIFY=${AI_INSIGHT_TRINO__OIDC_VERIFY:-true}
      - AI_INSIGHT_TRINO__TARGET_SCHEMA=${AI_INSIGHT_TRINO__TARGET_SCHEMA:-gold}
      - AI_INSIGHT_TRINO__TABLE_NET_GRID_HOURLY=${AI_INSIGHT_TRINO__TABLE_NET_GRID_HOURLY:-net_grid_hourly}
      - AI_INSIGHT_TRINO__TABLE_EVENT_IMPACT_DAILY=${AI_INSIGHT_TRINO__TABLE_EVENT_IMPACT_DAILY:-event_impact_daily}
      - AI_INSIGHT_TRINO__TABLE_STREETLIGHT_ZONE_HOURLY=${AI_INSIGHT_TRINO__TABLE_STREETLIGHT_ZONE_HOURLY:-streetlight_zone_hourly}
      - AI_INSIGHT_TRINO__TABLE_WEATHER_HOURLY=${AI_INSIGHT_TRINO__TABLE_WEATHER_HOURLY:-weather_hourly}
      - AI_INSIGHT_TRINO__TABLE_ENERGY_COST_DAILY=${AI_INSIGHT_TRINO__TABLE_ENERGY_COST_DAILY:-energy_cost_daily}
      - AI_INSIGHT_TRINO__TABLE_PV_SELF_CONSUMPTION_DAILY=${AI_INSIGHT_TRINO__TABLE_PV_SELF_CONSUMPTION_DAILY:-pv_self_consumption_daily}
      - AI_INSIGHT_TRINO__CATALOG=${AI_INSIGHT_TRINO__CATALOG:-hive}
      - AI_INSIGHT_TRINO__HTTP_SCHEME=${AI_INSIGHT_TRINO__HTTP_SCHEME:-http}
      - AI_INSIGHT_TRINO__VERIFY=${AI_INSIGHT_TRINO__VERIFY:-true}
      - AI_INSIGHT_TRINO__REQUEST_TIMEOUT_SECONDS=${AI_INSIGHT_TRINO__REQUEST_TIMEOUT_SECONDS:-120}
      - AI_INSIGHT_POLICY__ENABLED=${AI_INSIGHT_POLICY__ENABLED:-true}
      - AI_INSIGHT_POLICY__AGREEMENT_HEADER=${AI_INSIGHT_POLICY__AGREEMENT_HEADER:-x-agreement-id}
      - AI_INSIGHT_POLICY__ASSET_HEADER=${AI_INSIGHT_POLICY__ASSET_HEADER:-x-asset-id}
      - AI_INSIGHT_POLICY__ROLE_HEADER=${AI_INSIGHT_POLICY__ROLE_HEADER:-x-user-roles}
      - AI_INSIGHT_POLICY__REQUIRED_ROLES=${AI_INSIGHT_POLICY__REQUIRED_ROLES:-["ai_insight_consumer"]}
      - AI_INSIGHT_POLICY__ALLOWED_AGREEMENT_IDS=${AI_INSIGHT_POLICY__ALLOWED_AGREEMENT_IDS:-[]}
      - AI_INSIGHT_POLICY__ALLOWED_ASSET_IDS=${AI_INSIGHT_POLICY__ALLOWED_ASSET_IDS:-[]}
      - AI_INSIGHT_RATE_LIMIT__ENABLED=${AI_INSIGHT_RATE_LIMIT__ENABLED:-true}
      - AI_INSIGHT_RATE_LIMIT__REQUESTS_PER_MINUTE=${AI_INSIGHT_RATE_LIMIT__REQUESTS_PER_MINUTE:-10}
      - AI_INSIGHT_CACHE__ENABLED=${AI_INSIGHT_CACHE__ENABLED:-true}
      - AI_INSIGHT_CACHE__BACKEND=${AI_INSIGHT_CACHE__BACKEND:-redis}
      - AI_INSIGHT_CACHE__REDIS_URL=${AI_INSIGHT_CACHE__REDIS_URL:-redis://redis:6379/0}
      - AI_INSIGHT_CACHE__TTL_SECONDS=${AI_INSIGHT_CACHE__TTL_SECONDS:-300}
      - AI_INSIGHT_CACHE__KEY_PREFIX=${AI_INSIGHT_CACHE__KEY_PREFIX:-ai-insight:cache:v1}
      - AI_INSIGHT_CACHE__CONNECT_TIMEOUT_SECONDS=${AI_INSIGHT_CACHE__CONNECT_TIMEOUT_SECONDS:-1.0}
      - AI_INSIGHT_AUDIT__ENABLED=${AI_INSIGHT_AUDIT__ENABLED:-true}
      - AI_INSIGHT_AUDIT__LOGGER_NAME=${AI_INSIGHT_AUDIT__LOGGER_NAME:-src.audit}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ai-insight-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; p=os.getenv('AI_INSIGHT_HTTP__PORT','8080'); urllib.request.urlopen(f'http://localhost:{p}/api/v1/health', timeout=2)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:latest
    container_name: facis-ai-insight-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  ai-insight-data:
