apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-insight-service
  namespace: facis
  labels:
    app.kubernetes.io/name: ai-insight-service
    app.kubernetes.io/part-of: facis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-insight-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-insight-service
        app.kubernetes.io/part-of: facis
    spec:
      serviceAccountName: ai-insight-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ai-insight-service
          image: facis/ai-insight-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: FACIS_ENV
              value: cluster
            - name: AI_INSIGHT_HTTP__HOST
              value: "0.0.0.0"
            - name: AI_INSIGHT_HTTP__PORT
              value: "8080"
            - name: AI_INSIGHT_LLM__CHAT_COMPLETIONS_URL
              valueFrom:
                secretKeyRef:
                  name: ai-insight-secrets
                  key: llm_chat_completions_url
            - name: AI_INSIGHT_LLM__API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-insight-secrets
                  key: llm_api_key
            - name: AI_INSIGHT_TRINO__HOST
              valueFrom:
                configMapKeyRef:
                  name: ai-insight-config
                  key: trino_host
            - name: AI_INSIGHT_TRINO__PORT
              valueFrom:
                configMapKeyRef:
                  name: ai-insight-config
                  key: trino_port
            - name: AI_INSIGHT_TRINO__HTTP_SCHEME
              value: https
            - name: AI_INSIGHT_TRINO__VERIFY
              value: /app/certs/trino-ca.crt
            - name: AI_INSIGHT_RATE_LIMIT__REQUESTS_PER_MINUTE
              value: "10"
            - name: AI_INSIGHT_PROMPT_TEMPLATES__ENABLED
              value: "true"
            - name: AI_INSIGHT_PROMPT_TEMPLATES__PATH
              value: /app/config/prompts
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: trino-ca
              mountPath: /app/certs
              readOnly: true
            - name: prompt-templates
              mountPath: /app/config/prompts
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: trino-ca
          secret:
            secretName: ai-insight-trino-ca
        - name: prompt-templates
          configMap:
            name: ai-insight-prompt-templates
