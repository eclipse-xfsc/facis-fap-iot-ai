service:
  name: ai-insight-service
  environment: development

http:
  host: "0.0.0.0"
  port: 8080

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

llm:
  api_key: null
  model: gpt-4.1-mini
  chat_completions_url: null
  timeout_seconds: 30
  max_retries: 3
  retry_base_delay_seconds: 0.5
  retry_max_delay_seconds: 8.0
  require_https: true

trino:
  host: localhost
  port: 8080
  user: trino
  oidc_token_url: null
  oidc_client_id: null
  oidc_client_secret: null
  oidc_username: null
  oidc_password: null
  oidc_scope: openid
  oidc_verify: true
  target_schema: gold
  table_net_grid_hourly: net_grid_hourly
  table_event_impact_daily: event_impact_daily
  table_streetlight_zone_hourly: streetlight_zone_hourly
  table_weather_hourly: weather_hourly
  table_energy_cost_daily: energy_cost_daily
  table_pv_self_consumption_daily: pv_self_consumption_daily
  catalog: hive
  schema: default
  http_scheme: http
  verify: true
  request_timeout_seconds: 120

policy:
  enabled: true
  agreement_header: x-agreement-id
  asset_header: x-asset-id
  role_header: x-user-roles
  required_roles:
    - ai_insight_consumer
  allowed_agreement_ids: []
  allowed_asset_ids: []

rate_limit:
  enabled: true
  requests_per_minute: 10

cache:
  enabled: false
  backend: redis
  redis_url: null
  ttl_seconds: 300
  key_prefix: ai-insight:cache:v1
  connect_timeout_seconds: 1.0

audit:
  enabled: true
  log_prompts: true
  log_responses: true
  logger_name: src.audit

prompt_templates:
  enabled: false
  path: /app/config/prompts
