{{- if and (eq (default "orce" .Values.compatibilityMode) "orce") .Values.orcePodEnv.renderSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.orcePodEnv.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-sftp-ingestion.labels" . | nindent 4 }}
    app.kubernetes.io/component: orce-env
type: Opaque
stringData:
  SFTP_HOST: {{ .Values.sftp.host | quote }}
  SFTP_PORT: {{ .Values.sftp.port | quote }}
  SFTP_USERNAME: {{ .Values.sftp.username | quote }}
  SFTP_PASSWORD: {{ .Values.sftp.password | quote }}
  SFTP_REMOTE_PATH: {{ .Values.sftp.remotePath | quote }}
  SFTP_ARCHIVE_PATH: {{ .Values.sftp.archivePath | quote }}
  SFTP_POLL_INTERVAL_SECONDS: {{ .Values.sftp.pollIntervalSeconds | quote }}
  {{- with .Values.sftp.knownHostsFile }}
  SFTP_KNOWN_HOSTS_FILE: {{ . | quote }}
  {{- end }}
  {{- if .Values.sftp.allowUnknownHosts }}
  SFTP_ALLOW_UNKNOWN_HOSTS: "true"
  {{- end }}
  INGEST_DEFAULT_TOPIC: {{ .Values.ingest.defaultTopic | quote }}
  INGEST_DLQ_TOPIC: {{ .Values.ingest.dlqTopic | quote }}
  INGEST_ACCEPTED_EXTENSIONS: {{ .Values.ingest.acceptedExtensions | quote }}
  INGEST_MAX_FILE_SIZE_BYTES: {{ .Values.ingest.maxFileSizeBytes | quote }}
  SFTP_KAFKA_BROKERS: {{ .Values.kafka.brokers | quote }}
{{- end }}
