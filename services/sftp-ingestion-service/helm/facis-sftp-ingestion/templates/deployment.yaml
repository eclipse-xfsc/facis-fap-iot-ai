apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "facis-sftp-ingestion.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-sftp-ingestion.labels" . | nindent 4 }}
spec:
  replicas: {{ if eq (default "orce" .Values.compatibilityMode) "orce" }}0{{ else }}{{ .Values.replicaCount }}{{ end }}
  selector:
    matchLabels:
      {{- include "facis-sftp-ingestion.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "facis-sftp-ingestion.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "facis-sftp-ingestion.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "facis-sftp-ingestion.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.http.port }}
              protocol: TCP
          env:
            - name: HTTP_HOST
              value: "0.0.0.0"
            - name: HTTP_PORT
              value: {{ .Values.http.port | quote }}
            - name: SFTP_HOST
              value: {{ .Values.sftp.host | quote }}
            - name: SFTP_PORT
              value: {{ .Values.sftp.port | quote }}
            - name: SFTP_USERNAME
              value: {{ .Values.sftp.username | quote }}
            - name: SFTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "facis-sftp-ingestion.fullname" . }}-credentials
                  key: sftp_password
            - name: SFTP_REMOTE_PATH
              value: {{ .Values.sftp.remotePath | quote }}
            - name: SFTP_ARCHIVE_PATH
              value: {{ .Values.sftp.archivePath | quote }}
            - name: SFTP_POLL_INTERVAL_SECONDS
              value: {{ .Values.sftp.pollIntervalSeconds | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: KAFKA_CLIENT_ID
              value: {{ .Values.kafka.clientId | quote }}
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ .Values.kafka.securityProtocol | quote }}
            {{- if .Values.kafka.ssl.caLocation }}
            - name: KAFKA_SSL_CA_LOCATION
              value: {{ .Values.kafka.ssl.caLocation | quote }}
            {{- end }}
            - name: INGEST_DEFAULT_TOPIC
              value: {{ .Values.ingest.defaultTopic | quote }}
            - name: INGEST_ACCEPTED_EXTENSIONS
              value: {{ .Values.ingest.acceptedExtensions | quote }}
            - name: INGEST_DLQ_TOPIC
              value: {{ .Values.ingest.dlqTopic | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
