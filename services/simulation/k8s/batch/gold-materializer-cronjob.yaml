# ---------------------------------------------------------------------------
# Gold Layer Materializer — Kubernetes CronJob
#
# Runs materialize_gold.py on a schedule to convert Gold views into
# materialized Iceberg tables for fast query performance.
#
# Schedule offset: runs at minute 30, every 6 hours (after Silver
# materialization has had time to process new data).
#
# Prerequisites:
#   1. ConfigMap with scripts:
#      kubectl create configmap facis-gold-scripts \
#        --from-file=materialize_gold.py=scripts/materialize_gold.py \
#        --from-file=setup_lakehouse.py=scripts/setup_lakehouse.py \
#        -n stackable
#
#   2. Secret with credentials (shared with Silver materializer):
#      kubectl create secret generic facis-lakehouse-credentials \
#        --from-env-file=.env.cluster -n stackable
# ---------------------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: facis-gold-materializer
  namespace: stackable
  labels:
    app.kubernetes.io/name: facis-gold-materializer
    app.kubernetes.io/component: lakehouse
    app.kubernetes.io/part-of: facis-fap-iot-ai
spec:
  schedule: "30 */6 * * *"          # Every 6 hours at minute 30
  concurrencyPolicy: Forbid         # Skip if previous run is still active
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800   # 30 min max
      template:
        metadata:
          labels:
            app.kubernetes.io/name: facis-gold-materializer
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          initContainers:
          - name: install-deps
            image: python:3.11-slim@sha256:b1b81d67b8df73bf6067191790c233ef9e598b863fc1ccf447956138ca466d99
            command: ["/bin/sh", "-c"]
            args:
            - pip install --target=/deps trino requests tabulate 2>&1 | tail -1
            volumeMounts:
            - name: deps
              mountPath: /deps
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: [ALL]
          containers:
          - name: materializer
            image: python:3.11-slim@sha256:b1b81d67b8df73bf6067191790c233ef9e598b863fc1ccf447956138ca466d99
            command: ["/bin/sh", "-c"]
            args:
            - |
              export PYTHONPATH=/deps:/scripts
              python /scripts/materialize_gold.py --env-file /config/.env
            env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: [ALL]
            volumeMounts:
            - name: deps
              mountPath: /deps
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: credentials
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          volumes:
          - name: deps
            emptyDir: {}
          - name: tmp
            emptyDir:
              sizeLimit: 64Mi
          - name: scripts
            configMap:
              name: facis-gold-scripts
          - name: credentials
            secret:
              secretName: facis-lakehouse-credentials
