# =============================================================================
# FACIS Simulation Service — Helm Values
# =============================================================================
# All values are documented inline. Override any value with --set or -f.

# ---------------------------------------------------------------------------
# Runtime Mode
# ---------------------------------------------------------------------------
# Selects which runtime owns the simulation lifecycle, tick generation, and
# protocol publishing.
#
#   orce   (default) — ORCE-native flows on the existing ORCE pod own the
#                       simulation runtime. The Python deployment in this chart
#                       is scaled to 0 and acts as a rollback fallback.
#                       Helm post-install hook deploys flow JSON to the ORCE
#                       Admin API (see orceFlowDeploy below).
#   legacy           — Python service owns the runtime; ORCE flows act as
#                       passive Kafka/MQTT adapters consuming /api/sim/tick.
compatibilityMode: orce

# ---------------------------------------------------------------------------
# ORCE Flow Deployment (active when compatibilityMode = "orce")
# ---------------------------------------------------------------------------
orceFlowDeploy:
  # -- Whether to render the ConfigMap + post-install Job that deploy flows
  enabled: true
  # -- ORCE Admin API base URL (in-cluster)
  orceAdminUrl: http://facis-orce.orce.svc.cluster.local:1880
  # -- Secret holding the ORCE admin bearer token under key "token"
  adminTokenSecret: facis-orce-admin
  # -- Sub-path under the chart's `files/` directory containing flow JSON
  #    Populate via `services/simulation/helm/facis-simulation/sync-flows.sh`
  flowsDir: orce-flows
  # -- Container image used by the deployment Job (must include curl + jq)
  jobImage:
    repository: alpine/curl
    tag: "8.10.1"
    pullPolicy: IfNotPresent
  # -- Optional initial wait for the ORCE pod readiness probe (seconds)
  preDeploySleepSeconds: 5

# ---------------------------------------------------------------------------
# Container Image
# ---------------------------------------------------------------------------
image:
  # -- Container registry and repository
  repository: ghcr.io/eclipse-xfsc/facis-fap-iot-ai/simulation-service
  # -- Image tag (defaults to Chart appVersion)
  tag: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []
# - name: regcred

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Replica count
# ---------------------------------------------------------------------------
# -- Number of replicas (1 recommended — simulation is stateful/deterministic).
# When compatibilityMode == "orce", this value is ignored and the deployment
# is scaled to 0 (the ORCE pod owns the runtime).
replicaCount: 1

# ---------------------------------------------------------------------------
# Simulation Configuration
# ---------------------------------------------------------------------------
simulation:
  # -- Random seed for deterministic reproducibility (same seed = same output)
  seed: 12345
  # -- Interval in minutes between generated readings
  intervalMinutes: 1
  # -- Speed factor (1.0 = real-time, 60.0 = 1 simulated hour per real minute)
  speedFactor: 1.0
  # -- Simulation mode: 'normal' or 'event' (anomalies/spikes)
  mode: normal
  # -- Site identifier (shared across all feeds for correlation)
  siteId: site-berlin-001

# ---------------------------------------------------------------------------
# Entity Counts
# ---------------------------------------------------------------------------
entities:
  # -- Number of energy meters to simulate
  meters: 2
  # -- Number of PV systems to simulate
  pvSystems: 2
  # -- Number of consumer devices to simulate
  consumers: 4

# ---------------------------------------------------------------------------
# MQTT Broker Connection
# ---------------------------------------------------------------------------
mqtt:
  # -- MQTT broker hostname
  host: facis-mqtt
  # -- MQTT broker port
  port: 1883
  # -- MQTT client identifier
  clientId: facis-simulator
  # -- Default QoS level (0, 1, or 2)
  qos: 1

# ---------------------------------------------------------------------------
# Kafka Connection
# ---------------------------------------------------------------------------
kafka:
  # -- Enable Kafka publishing
  enabled: true
  # -- Kafka bootstrap server(s)
  bootstrapServers: kafka:9092
  # -- Kafka client identifier
  clientId: facis-simulator
  # -- Security protocol: PLAINTEXT or SSL
  securityProtocol: PLAINTEXT
  # -- SSL certificate paths (when securityProtocol=SSL)
  ssl:
    # -- Path to CA certificate inside the container
    caLocation: ""
    # -- Path to client certificate inside the container
    certificateLocation: ""
    # -- Path to client key inside the container
    keyLocation: ""

# ---------------------------------------------------------------------------
# ORCE (Orchestration Engine) Connection
# ---------------------------------------------------------------------------
orce:
  # -- Enable ORCE publishing
  enabled: false
  # -- ORCE base URL
  url: http://facis-orce:1880
  # -- ORCE webhook path
  webhookPath: /api/sim/tick
  # -- Request timeout in seconds
  timeoutSeconds: 10.0

# ---------------------------------------------------------------------------
# HTTP / REST API
# ---------------------------------------------------------------------------
http:
  # -- HTTP listen port inside the container
  port: 8080

# ---------------------------------------------------------------------------
# Modbus TCP
# ---------------------------------------------------------------------------
modbus:
  # -- Enable Modbus TCP server
  enabled: true
  # -- Modbus listen port inside the container
  port: 502

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  # -- Kubernetes Service type
  type: ClusterIP
  # -- HTTP service port
  httpPort: 8080
  # -- Modbus service port
  modbusPort: 502
  # -- Additional annotations for the Service
  annotations: {}

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  # -- Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

# ---------------------------------------------------------------------------
# Pod Security Context
# ---------------------------------------------------------------------------
podSecurityContext:
  # -- Run all containers as non-root
  runAsNonRoot: true
  # -- UID to run as (matches Dockerfile USER 1000)
  runAsUser: 1000
  # -- GID to run as
  runAsGroup: 1000
  # -- Filesystem group
  fsGroup: 1000

# ---------------------------------------------------------------------------
# Container Security Context
# ---------------------------------------------------------------------------
securityContext:
  # -- Disallow privilege escalation
  allowPrivilegeEscalation: false
  # -- Read-only root filesystem
  readOnlyRootFilesystem: true
  # -- Run as non-root
  runAsNonRoot: true
  # -- UID to run as
  runAsUser: 1000
  # -- Drop all Linux capabilities
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Resource Requests and Limits
# ---------------------------------------------------------------------------
resources:
  requests:
    # -- CPU request
    cpu: 100m
    # -- Memory request
    memory: 128Mi
  limits:
    # -- CPU limit
    cpu: 500m
    # -- Memory limit
    memory: 512Mi

# ---------------------------------------------------------------------------
# Liveness and Readiness Probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount name (generated if empty)
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Automount API credentials into pods
  automountServiceAccountToken: false

# ---------------------------------------------------------------------------
# Ingress (optional)
# ---------------------------------------------------------------------------
ingress:
  # -- Enable Ingress resource
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # -- Ingress host rules
  hosts: []
  #  - host: simulation.facis.cloud
  #    paths:
  #      - path: /
  #        pathType: Prefix
  # -- TLS configuration
  tls: []

# ---------------------------------------------------------------------------
# Node scheduling
# ---------------------------------------------------------------------------
# -- Node selector labels
nodeSelector: {}
# -- Tolerations
tolerations: []
# -- Affinity rules
affinity: {}

# ---------------------------------------------------------------------------
# Prometheus Metrics
# ---------------------------------------------------------------------------
metrics:
  # -- Path where Prometheus metrics are served
  path: /metrics
  # -- ServiceMonitor configuration (requires Prometheus Operator)
  serviceMonitor:
    # -- Enable ServiceMonitor resource
    enabled: false
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout
    scrapeTimeout: 10s
    # -- Additional labels for ServiceMonitor (e.g. for Prometheus selector)
    additionalLabels: {}

# ---------------------------------------------------------------------------
# Autoscaling (HPA)
# ---------------------------------------------------------------------------
autoscaling:
  # -- Enable Horizontal Pod Autoscaler (overrides replicaCount when true)
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage (0 to disable)
  targetCPUUtilizationPercentage: 70
  # -- Target memory utilization percentage (0 to disable)
  targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Silver Materializer CronJob
# ---------------------------------------------------------------------------
silverMaterializer:
  # -- Enable Silver materializer CronJob (incremental Bronze → Silver)
  enabled: false
  # -- Cron schedule (default: every 10 minutes)
  schedule: "*/10 * * * *"
  # -- Container image for materializer jobs
  image:
    repository: python
    tag: "3.11-slim"
  # -- ConfigMap containing materialize_silver.py and setup_lakehouse.py
  scriptsConfigMap: facis-silver-scripts
  # -- Secret containing .env.cluster credentials
  credentialsSecret: facis-lakehouse-credentials
  # -- Resource requests/limits for materializer container
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # -- Number of successful jobs to retain
  successfulJobsHistoryLimit: 3
  # -- Number of failed jobs to retain
  failedJobsHistoryLimit: 3
  # -- Number of retries on failure
  backoffLimit: 1
  # -- Maximum job runtime in seconds
  activeDeadlineSeconds: 540

# ---------------------------------------------------------------------------
# Gold Materializer CronJob
# ---------------------------------------------------------------------------
goldMaterializer:
  # -- Enable Gold materializer CronJob (Silver views → Gold Iceberg tables)
  enabled: false
  # -- Cron schedule (default: every 6 hours at minute 30)
  schedule: "30 */6 * * *"
  # -- Container image for materializer jobs
  image:
    repository: python
    tag: "3.11-slim"
  # -- ConfigMap containing materialize_gold.py and setup_lakehouse.py
  scriptsConfigMap: facis-gold-scripts
  # -- Secret containing .env.cluster credentials
  credentialsSecret: facis-lakehouse-credentials
  # -- Resource requests/limits for materializer container
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # -- Number of successful jobs to retain
  successfulJobsHistoryLimit: 3
  # -- Number of failed jobs to retain
  failedJobsHistoryLimit: 3
  # -- Number of retries on failure
  backoffLimit: 2
  # -- Maximum job runtime in seconds
  activeDeadlineSeconds: 1800

# ---------------------------------------------------------------------------
# Additional environment variables
# ---------------------------------------------------------------------------
# -- Extra environment variables injected into the container
extraEnv: []
# - name: SIMULATOR_SIMULATION__START_TIME
#   value: "2024-01-15T08:00:00Z"

# ---------------------------------------------------------------------------
# Additional volumes and volume mounts
# ---------------------------------------------------------------------------
# -- Extra volumes
extraVolumes: []
# -- Extra volume mounts
extraVolumeMounts: []
