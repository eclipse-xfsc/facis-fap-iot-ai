apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "facis-simulation.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-simulation.labels" . | nindent 4 }}
data:
  default.yaml: |
    # =========================================================================
    # FACIS Simulation Service — Kubernetes Configuration
    # Generated by Helm chart {{ include "facis-simulation.chart" . }}
    # =========================================================================

    site_id: {{ .Values.simulation.siteId | quote }}

    simulation:
      seed: {{ .Values.simulation.seed }}
      interval_minutes: {{ .Values.simulation.intervalMinutes }}
      speed_factor: {{ .Values.simulation.speedFactor }}
      mode: {{ .Values.simulation.mode }}

    mqtt:
      host: {{ .Values.mqtt.host | quote }}
      port: {{ .Values.mqtt.port }}
      client_id: {{ .Values.mqtt.clientId | quote }}
      qos: {{ .Values.mqtt.qos }}

    kafka:
      bootstrap_servers: {{ .Values.kafka.bootstrapServers | quote }}
      client_id: {{ .Values.kafka.clientId | quote }}
      enabled: {{ .Values.kafka.enabled }}
      security_protocol: {{ .Values.kafka.securityProtocol | quote }}
      {{- if .Values.kafka.ssl.caLocation }}
      ssl_ca_location: {{ .Values.kafka.ssl.caLocation | quote }}
      {{- end }}
      {{- if .Values.kafka.ssl.certificateLocation }}
      ssl_certificate_location: {{ .Values.kafka.ssl.certificateLocation | quote }}
      {{- end }}
      {{- if .Values.kafka.ssl.keyLocation }}
      ssl_key_location: {{ .Values.kafka.ssl.keyLocation | quote }}
      {{- end }}

    orce:
      url: {{ .Values.orce.url | quote }}
      webhook_path: {{ .Values.orce.webhookPath | quote }}
      enabled: {{ .Values.orce.enabled }}
      timeout_seconds: {{ .Values.orce.timeoutSeconds }}

    http:
      host: "0.0.0.0"
      port: {{ .Values.http.port }}

    modbus:
      host: "0.0.0.0"
      port: {{ .Values.modbus.port }}

    logging:
      level: {{ .Values.logging.level | quote }}
