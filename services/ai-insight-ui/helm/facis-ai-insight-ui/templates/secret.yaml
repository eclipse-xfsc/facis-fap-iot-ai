{{/*
Secret: LLM API keys
─────────────────────
Holds the API keys consumed by the ORCE flows via environment variables.
Creation is conditional on .Values.llmSecret.create so that operators who
manage secrets externally (e.g., External Secrets Operator, Vault Agent) can
set create: false and provide the Secret out-of-band.

The ORCE deployment must reference these keys in its env section:
  - name: FACIS_OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: {{ include "facis-ai-insight-ui.llmSecretName" . }}
        key: openai-api-key
  - name: FACIS_ANTHROPIC_API_KEY
    valueFrom:
      secretKeyRef:
        name: {{ include "facis-ai-insight-ui.llmSecretName" . }}
        key: anthropic-api-key
  - name: FACIS_CUSTOM_LLM_KEY
    valueFrom:
      secretKeyRef:
        name: {{ include "facis-ai-insight-ui.llmSecretName" . }}
        key: custom-llm-key
        optional: true

See NOTES.txt for the full ORCE patch snippet.
*/}}
{{- if .Values.llmSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "facis-ai-insight-ui.llmSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "facis-ai-insight-ui.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    # Prevent helm diff / ArgoCD from showing diffs on secret values.
    helm.sh/chart: {{ include "facis-ai-insight-ui.chart" . }}
    {{- with .Values.llmSecret.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- include "facis-ai-insight-ui.annotations" . | nindent 4 }}
type: Opaque
stringData:
  openai-api-key: {{ .Values.llmSecret.openaiApiKey | quote }}
  anthropic-api-key: {{ .Values.llmSecret.anthropicApiKey | quote }}
  custom-llm-key: {{ .Values.llmSecret.customLlmKey | quote }}
{{- end }}
